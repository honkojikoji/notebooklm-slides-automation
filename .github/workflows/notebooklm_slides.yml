name: NotebookLM Slide Generator

on:
  schedule:
    - cron: '*/30 * * * *'   # 30分ごとに実行
  workflow_dispatch:          # 手動実行も可能

jobs:
  generate-slides:
    runs-on: ubuntu-latest
    timeout-minutes: 15       # 安全策として15分で強制終了

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Chrome プロファイルの取得（前回更新 Artifact → なければ初期 Artifact）──
      - name: Find latest Chrome profile artifact
        id: find-artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 更新済みプロファイル (chrome-profile-updated-*) を優先取得
          LATEST=$(gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '[.artifacts[] | select(.name | startswith("chrome-profile-updated-")) | select(.expired == false)] | sort_by(.created_at) | last | .id' \
            2>/dev/null || echo "")

          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            # なければ初期プロファイルを使用
            LATEST=$(gh api repos/${{ github.repository }}/actions/artifacts \
              --jq '[.artifacts[] | select(.name == "chrome-profile-base") | select(.expired == false)] | last | .id' \
              2>/dev/null || echo "")
            echo "Using base profile (artifact: $LATEST)"
          else
            echo "Using updated profile (artifact: $LATEST)"
          fi

          echo "artifact_id=$LATEST" >> $GITHUB_OUTPUT

      - name: Download Chrome profile artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_ID="${{ steps.find-artifact.outputs.artifact_id }}"
          if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" = "null" ]; then
            echo "ERROR: No Chrome profile artifact found."
            echo "Please run the 'Upload Chrome Profile' workflow first."
            exit 1
          fi
          mkdir -p chrome_profile
          gh api repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip \
            > artifact.zip
          unzip -q artifact.zip -d chrome_profile/
          echo "CHROME_PROFILE_DIR=$(pwd)/chrome_profile" >> $GITHUB_ENV
          echo "Profile restored: $(find chrome_profile -type f | wc -l) files"

      - name: Run dispatcher
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          CHROME_PROFILE_DIR: ${{ env.CHROME_PROFILE_DIR }}
        run: |
          xvfb-run python scripts/dispatcher.py

      - name: Upload updated Chrome profile as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chrome-profile-updated-${{ github.run_number }}
          path: chrome_profile/
          retention-days: 7
          if-no-files-found: ignore
