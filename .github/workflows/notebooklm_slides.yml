name: NotebookLM Slide Generator

on:
  schedule:
    - cron: '0 * * * *'   # 1時間ごとに実行
  workflow_dispatch:          # 手動実行も可能

jobs:
  generate-slides:
    runs-on: windows-latest
    timeout-minutes: 15       # 安全策として15分で強制終了
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Python dependencies
        shell: bash
        run: pip install -r requirements.txt

      # ── Chrome プロファイルをReleaseアセットから取得 ──
      - name: Download Chrome profile from Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHROME_PROFILE_KEY: ${{ secrets.CHROME_PROFILE_KEY }}
        run: |
          echo "Downloading Chrome profile from release asset..."
          gh release download chrome-profile-storage \
            --repo ${{ github.repository }} \
            --pattern "chrome_profile_full_enc.zip" \
            --output profile_enc.zip

          echo "Decrypting..."
          openssl aes-256-cbc -d -pbkdf2 \
            -in profile_enc.zip \
            -out profile_dec.zip \
            -pass pass:$CHROME_PROFILE_KEY

          echo "Extracting..."
          mkdir -p chrome_profile
          python -m zipfile -e profile_dec.zip chrome_profile/
          echo "CHROME_PROFILE_DIR=$(pwd)/chrome_profile" >> $GITHUB_ENV
          echo "Profile files: $(find chrome_profile -type f | wc -l)"

      - name: Run dispatcher
        shell: bash
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          CHROME_PROFILE_DIR: ${{ env.CHROME_PROFILE_DIR }}
        run: |
          python scripts/dispatcher.py

      # ── 実行後のプロファイル変更をReleaseに反映 ──
      - name: Update Chrome profile in Release
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHROME_PROFILE_KEY: ${{ secrets.CHROME_PROFILE_KEY }}
        run: |
          if [ ! -d "chrome_profile" ]; then
            echo "No chrome_profile directory found, skipping update"
            exit 0
          fi

          echo "Packaging updated profile..."
          find chrome_profile/ -type f -print | zip -q profile_updated.zip -@

          echo "Encrypting..."
          openssl aes-256-cbc -e -pbkdf2 \
            -in profile_updated.zip \
            -out chrome_profile_full_enc.zip \
            -pass pass:$CHROME_PROFILE_KEY

          echo "Uploading to release..."
          gh release upload chrome-profile-storage \
            --repo ${{ github.repository }} \
            --clobber \
            chrome_profile_full_enc.zip

          echo "Profile updated in release"
