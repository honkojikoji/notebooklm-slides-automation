name: Upload Chrome Profile (Run Once)
# このワークフローは初回セットアップ時に1度だけ手動実行します。
# ローカルで作成した chrome_profile_minimal.zip を Artifact として保存します。

on:
  workflow_dispatch:
    inputs:
      profile_zip_b64_part1:
        description: 'Base64 encoded encrypted zip (part 1/3)'
        required: true
      profile_zip_b64_part2:
        description: 'Base64 encoded encrypted zip (part 2/3, or empty)'
        required: false
        default: ''
      profile_zip_b64_part3:
        description: 'Base64 encoded encrypted zip (part 3/3, or empty)'
        required: false
        default: ''

jobs:
  upload-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Reconstruct and save Chrome profile
        env:
          CHROME_PROFILE_KEY: ${{ secrets.CHROME_PROFILE_KEY }}
        run: |
          # Base64 を結合してデコード
          COMBINED="${{ inputs.profile_zip_b64_part1 }}${{ inputs.profile_zip_b64_part2 }}${{ inputs.profile_zip_b64_part3 }}"
          echo "$COMBINED" | base64 -d > profile_enc.zip

          # 復号
          openssl aes-256-cbc -d -pbkdf2 \
            -in profile_enc.zip \
            -out profile_dec.zip \
            -pass pass:$CHROME_PROFILE_KEY

          # 展開
          mkdir -p chrome_profile
          unzip -q profile_dec.zip -d chrome_profile/
          echo "Profile contents:"
          find chrome_profile -type f | head -20

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-profile-base
          path: chrome_profile/
          retention-days: 90
